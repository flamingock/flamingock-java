# Auto-applied by GraalVM native-image when this JAR is on the build classpath.
# Wires the Flamingock RegistrationFeature so users no longer need to pass
# --features=io.flamingock.graalvm.RegistrationFeature themselves. Discovered the
# same way by plain native-image, Spring Boot's Native Build Tools plugin, and any
# other tool that delegates to native-image.
Args = --features=io.flamingock.graalvm.RegistrationFeature
